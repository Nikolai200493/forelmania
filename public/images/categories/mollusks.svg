<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C"/>
      <stop offset="100%" style="stop-color:#16A085"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Waves -->
  <path d="M0,310 Q150,270 300,310 T600,310 L600,400 L0,400 Z" fill="rgba(255,255,255,0.06)"/>
  <path d="M0,350 Q150,310 300,350 T600,350 L600,400 L0,400 Z" fill="rgba(255,255,255,0.06)"/>
  <!-- Shell icon -->
  <g transform="translate(300, 150)" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2.5">
    <!-- Scallop shell shape -->
    <path d="M0,-35 Q-40,-20 -40,15 Q-40,35 0,40 Q40,35 40,15 Q40,-20 0,-35"/>
    <!-- Shell ridges -->
    <path d="M0,-35 Q-10,0 -35,30"/>
    <path d="M0,-35 Q-5,0 -18,35"/>
    <path d="M0,-35 Q0,0 0,40"/>
    <path d="M0,-35 Q5,0 18,35"/>
    <path d="M0,-35 Q10,0 35,30"/>
  </g>
  <!-- Label -->
  <text x="300" y="260" text-anchor="middle" fill="white" font-size="36" font-family="sans-serif" font-weight="bold" dy=".3em">Mollusks</text>
  <circle cx="80" cy="55" r="22" fill="rgba(255,255,255,0.05)"/>
  <circle cx="520" cy="340" r="30" fill="rgba(255,255,255,0.04)"/>
</svg>
