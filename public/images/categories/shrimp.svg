<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E85D3A"/>
      <stop offset="100%" style="stop-color:#FF8C69"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Waves -->
  <path d="M0,310 Q150,270 300,310 T600,310 L600,400 L0,400 Z" fill="rgba(255,255,255,0.06)"/>
  <path d="M0,350 Q150,310 300,350 T600,350 L600,400 L0,400 Z" fill="rgba(255,255,255,0.06)"/>
  <!-- Shrimp icon (curved shape) -->
  <g transform="translate(300, 155)" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4">
    <path d="M-30,-30 Q-10,-50 15,-40 Q35,-30 30,-5 Q25,15 10,25 Q-5,30 -15,20" stroke-width="6"/>
    <circle cx="-30" cy="-30" r="3" fill="rgba(255,255,255,0.2)"/>
    <!-- Antennae -->
    <path d="M-30,-30 Q-50,-50 -55,-60"/>
    <path d="M-30,-30 Q-40,-55 -35,-65"/>
    <!-- Tail segments -->
    <line x1="10" y1="25" x2="20" y2="35"/>
    <line x1="10" y1="25" x2="5" y2="40"/>
    <line x1="10" y1="25" x2="15" y2="42"/>
  </g>
  <!-- Label -->
  <text x="300" y="260" text-anchor="middle" fill="white" font-size="36" font-family="sans-serif" font-weight="bold" dy=".3em">Shrimp</text>
  <circle cx="80" cy="60" r="25" fill="rgba(255,255,255,0.05)"/>
  <circle cx="520" cy="350" r="35" fill="rgba(255,255,255,0.04)"/>
</svg>
