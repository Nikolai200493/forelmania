<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#34495E"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Gold accent line -->
  <line x1="200" y1="290" x2="400" y2="290" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  <!-- Waves -->
  <path d="M0,320 Q150,280 300,320 T600,320 L600,400 L0,400 Z" fill="rgba(255,255,255,0.04)"/>
  <path d="M0,360 Q150,320 300,360 T600,360 L600,400 L0,400 Z" fill="rgba(255,255,255,0.04)"/>
  <!-- Caviar icon (cluster of circles) -->
  <g transform="translate(300, 155)" fill="none" stroke="rgba(212,175,55,0.25)" stroke-width="1.5">
    <circle cx="-20" cy="-15" r="12"/>
    <circle cx="5" cy="-18" r="12"/>
    <circle cx="25" cy="-10" r="12"/>
    <circle cx="-28" cy="5" r="12"/>
    <circle cx="-5" cy="2" r="12"/>
    <circle cx="18" cy="8" r="12"/>
    <circle cx="-15" cy="22" r="12"/>
    <circle cx="8" cy="20" r="12"/>
    <circle cx="30" cy="15" r="12"/>
    <!-- Small highlights -->
    <circle cx="-17" cy="-18" r="3" fill="rgba(212,175,55,0.1)"/>
    <circle cx="8" cy="-21" r="3" fill="rgba(212,175,55,0.1)"/>
    <circle cx="28" cy="-13" r="3" fill="rgba(212,175,55,0.1)"/>
  </g>
  <!-- Label -->
  <text x="300" y="260" text-anchor="middle" fill="#D4AF37" font-size="36" font-family="sans-serif" font-weight="bold" dy=".3em">Caviar</text>
  <circle cx="60" cy="40" r="15" fill="rgba(212,175,55,0.04)"/>
  <circle cx="540" cy="60" r="25" fill="rgba(212,175,55,0.03)"/>
</svg>
