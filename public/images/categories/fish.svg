<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B3D5C"/>
      <stop offset="100%" style="stop-color:#1A7A7A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Waves -->
  <path d="M0,300 Q150,260 300,300 T600,300 L600,400 L0,400 Z" fill="rgba(255,255,255,0.06)"/>
  <path d="M0,340 Q150,300 300,340 T600,340 L600,400 L0,400 Z" fill="rgba(255,255,255,0.06)"/>
  <!-- Fish icon -->
  <g transform="translate(300, 160) scale(2)" fill="rgba(255,255,255,0.15)">
    <ellipse cx="0" cy="0" rx="50" ry="22"/>
    <polygon points="45,-5 70,-22 70,22 45,5"/>
    <circle cx="-25" cy="-5" r="4" fill="rgba(255,255,255,0.25)"/>
    <!-- Fin -->
    <path d="M-5,-20 Q5,-35 15,-20" stroke="rgba(255,255,255,0.15)" fill="none" stroke-width="2"/>
  </g>
  <!-- Label -->
  <text x="300" y="260" text-anchor="middle" fill="white" font-size="36" font-family="sans-serif" font-weight="bold" dy=".3em">Fish</text>
  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="20" fill="rgba(255,255,255,0.04)"/>
  <circle cx="550" cy="80" r="30" fill="rgba(255,255,255,0.03)"/>
</svg>
