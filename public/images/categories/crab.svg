<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0392B"/>
      <stop offset="100%" style="stop-color:#E74C3C"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Waves -->
  <path d="M0,310 Q150,270 300,310 T600,310 L600,400 L0,400 Z" fill="rgba(255,255,255,0.06)"/>
  <path d="M0,350 Q150,310 300,350 T600,350 L600,400 L0,400 Z" fill="rgba(255,255,255,0.06)"/>
  <!-- Crab icon -->
  <g transform="translate(300, 150)" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.15)" stroke-width="3">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="40" ry="28"/>
    <!-- Eyes -->
    <circle cx="-15" cy="-30" r="5"/>
    <line x1="-15" y1="-28" x2="-12" y2="-20"/>
    <circle cx="15" cy="-30" r="5"/>
    <line x1="15" y1="-28" x2="12" y2="-20"/>
    <!-- Claws -->
    <path d="M-40,0 Q-60,-10 -65,-25" fill="none" stroke-width="4"/>
    <circle cx="-67" cy="-28" r="8" fill="none"/>
    <path d="M40,0 Q60,-10 65,-25" fill="none" stroke-width="4"/>
    <circle cx="67" cy="-28" r="8" fill="none"/>
    <!-- Legs -->
    <line x1="-35" y1="10" x2="-55" y2="25"/>
    <line x1="-30" y1="18" x2="-50" y2="35"/>
    <line x1="-25" y1="25" x2="-42" y2="42"/>
    <line x1="35" y1="10" x2="55" y2="25"/>
    <line x1="30" y1="18" x2="50" y2="35"/>
    <line x1="25" y1="25" x2="42" y2="42"/>
  </g>
  <!-- Label -->
  <text x="300" y="265" text-anchor="middle" fill="white" font-size="36" font-family="sans-serif" font-weight="bold" dy=".3em">Crab</text>
  <circle cx="70" cy="50" r="20" fill="rgba(255,255,255,0.04)"/>
  <circle cx="530" cy="70" r="30" fill="rgba(255,255,255,0.03)"/>
</svg>
