<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B3D5C"/>
      <stop offset="50%" style="stop-color:#1A6B7A"/>
      <stop offset="100%" style="stop-color:#1ABC9C"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="800" fill="url(#bg)"/>
  <!-- Decorative waves -->
  <path d="M0,500 Q240,420 480,500 T960,500 T1440,500 T1920,500 L1920,800 L0,800 Z" fill="rgba(255,255,255,0.05)"/>
  <path d="M0,560 Q240,480 480,560 T960,560 T1440,560 T1920,560 L1920,800 L0,800 Z" fill="rgba(255,255,255,0.05)"/>
  <path d="M0,620 Q240,540 480,620 T960,620 T1440,620 T1920,620 L1920,800 L0,800 Z" fill="rgba(255,255,255,0.07)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="80" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1700" cy="200" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1400" cy="100" r="50" fill="rgba(255,255,255,0.05)"/>
  <circle cx="500" cy="650" r="60" fill="rgba(255,255,255,0.04)"/>
  <!-- Fish silhouette left -->
  <g transform="translate(300, 300) scale(1.5)" opacity="0.08" fill="white">
    <ellipse cx="0" cy="0" rx="60" ry="25"/>
    <polygon points="55,-5 80,-25 80,25 55,5"/>
    <circle cx="-30" cy="-5" r="4"/>
  </g>
  <!-- Fish silhouette right -->
  <g transform="translate(1600, 350) scale(1.2) rotate(15)" opacity="0.06" fill="white">
    <ellipse cx="0" cy="0" rx="60" ry="25"/>
    <polygon points="55,-5 80,-25 80,25 55,5"/>
    <circle cx="-30" cy="-5" r="4"/>
  </g>
  <!-- Main text -->
  <text x="960" y="360" text-anchor="middle" fill="white" font-size="72" font-family="sans-serif" font-weight="bold" letter-spacing="2">FORELMANIA</text>
  <text x="960" y="430" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="32" font-family="sans-serif" font-weight="300" letter-spacing="4">Premium Seafood</text>
  <!-- Decorative line -->
  <line x1="860" y1="460" x2="1060" y2="460" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
</svg>
